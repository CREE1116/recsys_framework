  - name: "ChebyASPIRE"
    method: "bayesian"
    model_config: "configs/model/csar/cheby_aspire.yaml"
    params:
      - name: "model.gamma"
        type: "float"
        range: "0.01 2.0"
      - name: "model.degree"
        type: "categorical"
        choices: [10, 20, 30, 40]
    n_trials: 60
    patience: 20
    metric: "NDCG@20"
