  - "Recall@10"
  - "HitRate@10"
  - "Coverage@10"
  - "LongTailCoverage@10"
  - "LongTailRecall@10"
  - "LongTailHitRate@10"
  - "LongTailNDCG@20"
  - "HeadRecall@10"
  - "HeadHitRate@10"
  - "HeadNDCG@20"

  - "NDCG@20"
