# LIRA 논문용 베이스라인 Bayesian 탐색 설정
# 실행: uv run python scripts/run_all_smart_searches.py --config configs/paper_baselines_search.yaml --output_dir output/paper_baselines

datasets:
  - "configs/dataset/ml100k.yaml"
  - "configs/dataset/ml1m.yaml"
  - "configs/dataset/ml20m.yaml"
  - "configs/dataset/steam.yaml"
  # - "configs/dataset/lastfm_2k.yaml"
  # - "configs/dataset/amazon_music.yaml"
  # - "configs/dataset/gowalla.yaml"
  # - "configs/dataset/yelp2018.yaml"
  # - "configs/dataset/amazon_electronics.yaml"
  # - "configs/dataset/amazon_books.yaml"

seeds: [42, 43, 44]
# seeds: [42]

# 데이터셋 요약 시 표시할 메트릭 (target metric은 항상 포함)
summary_metrics:
  - "NDCG@10"
  - "Recall@10"
  - "HitRate@10"
  - "Coverage@10"
  - "LongTailCoverage@10"
  - "LongTailRecall@10"
  - "LongTailHitRate@10"
  - "LongTailNDCG@10"
  - "HeadRecall@10"
  - "HeadHitRate@10"
  - "HeadNDCG@10"

  - "NDCG@20"
  - "Recall@20"
  - "HitRate@20"
  - "Coverage@20"
  - "LongTailCoverage@20"
  - "LongTailRecall@20"
  - "LongTailNDCG@20"
  - "HeadRecall@20"
  - "HeadHitRate@20"
  - "HeadNDCG@20"

searches:
  # ============================================================
  # Baselines: Linear / Closed-form
  # ============================================================

  - name: "EASE"
    method: "bayesian"
    model_config: "configs/model/general/ease.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "0.1 100000"
        log: true
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

  - name: "iALS"
    method: "bayesian"
    model_config: "configs/model/general/ials.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "1e-4 100.0"
        log: true
      - name: "model.alpha"
        type: "float"
        range: "1.0 200.0"
        log: true
      - name: "model.embedding_dim"
        type: "categorical"
        range: "32 64 128 256"
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

  - name: "ItemKNN"
    method: "bayesian"
    model_config: "configs/model/general/item_knn.yaml"
    params:
      - name: "model.k"
        type: "int"
        range: "10 500"
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

  # # ============================================================
  # # Baselines: Spectral / SVD
  # # ============================================================

  - name: "PureSVD"
    method: "bayesian"
    model_config: "configs/model/general/pure_svd.yaml"
    params:
      - name: "model.embedding_dim"
        type: "int_min_dim"
        log: true
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

  - name: "GF-CF"
    method: "bayesian"
    model_config: "configs/model/general/gf_cf.yaml"
    params:
      - name: "model.k"
        type: "int_min_dim"
        log: true
      - name: "model.alpha"
        type: "float"
        range: "0.0 2.0"
      - name: "model.norm_weight"
        type: "float"
        range: "0.0 1.0"
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

  # ============================================================
  # Baselines: EASE Variants
  # ============================================================

  - name: "RLAE"
    method: "bayesian"
    model_config: "configs/model/general/rlae.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "0.1 100000"
        log: true
      - name: "model.b"
        type: "float"
        range: "0.0 1.0"
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

  - name: "SANSA"
    method: "bayesian"
    model_config: "configs/model/general/sansa.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "0.1 100000"
        log: true
      - name: "model.density"
        type: "float"
        range: "0.01 0.5"
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

  - name: "SVD_AE"
    method: "bayesian"
    model_config: "configs/model/general/svd_ae.yaml"
    params:
      - name: "model.gamma"
        type: "float"
        range: "0.01 1.0"
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

  # - name: "SVD-EASE"
  #   method: "bayesian"
  #   model_config: "configs/model/general/svd_ease.yaml"
  #   params:
  #     - name: "model.reg_lambda"
  #       type: "float"
  #       range: "0.1 100000"
  #       log: true
  #     - name: "model.k"
  #       type: "int"
  #       range: "64 1024"
  #   n_trials: 60
  #   patience: 20
  #   metric: "NDCG@20"

  # # ============================================================
  # # Ours: LIRA Family
  # # ============================================================

  - name: "LIRA"
    method: "bayesian"
    model_config: "configs/model/csar/lira.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "0.1 100000.0"
        log: true
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

  - name: "LightLIRA"
    method: "bayesian"
    model_config: "configs/model/csar/light_lira.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "0.1 10000.0"
        log: true
      - name: "model.k"
        type: "int_min_dim"
        log: true
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

  - name: "ASPIRE"
    method: "bayesian"
    model_config: "configs/model/csar/aspire.yaml"
    params:
      - name: "model.alpha"
        type: "float"
        range: "0.1 100000.0"
        log: true
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

