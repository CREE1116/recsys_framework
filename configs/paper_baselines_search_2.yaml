# LIRA 논문용 베이스라인 Bayesian 탐색 설정
# 실행: uv run python scripts/run_all_smart_searches.py --config configs/paper_baselines_search.yaml --output_dir output/paper_baselines

datasets:
  - "configs/dataset/ml100k.yaml"
  - "configs/dataset/ml1m.yaml"
  # - "configs/dataset/ml20m.yaml"
  # - "configs/dataset/steam.yaml"
  # - "configs/dataset/lastfm_2k.yaml"
  # - "configs/dataset/amazon_music.yaml"
  # - "configs/dataset/gowalla.yaml"
  # - "configs/dataset/yelp2018.yaml"
  # - "configs/dataset/amazon_electronics.yaml"
  # - "configs/dataset/amazon_books.yaml"

seeds: [42, 43, 44, 45, 46]
# seeds: [42]

# 데이터셋 요약 시 표시할 메트릭 (target metric은 항상 포함)
summary_metrics:
  - "NDCG@10"
  - "Recall@10"
  - "Coverage@10"
  - "LongTailCoverage@10"
  - "LongTailRecall@10"
  - "LongTailNDCG@10"
  - "NDCG@20"
  - "Recall@20"
  - "Coverage@20"
  - "LongTailCoverage@20"
  - "LongTailRecall@20"
  - "LongTailNDCG@20"
searches:
  - name: "LightGCN"
    method: "bayesian"
    model_config: "configs/model/general/lightgcn.yaml"
    params:
      - name: "model.n_layers"
        type: "int"
        range: "1 3"
      - name: "train.lr"
        type: "float"
        range: "0.00001 0.01"
      - name: "train.embedding_l2"
        type: "float"
        range: "0.00001 0.01"
      - name: "model.embedding_dim"
        type: "int"
        range: "64 128"
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

  # ============================================================
  # Baselines: Matrix Factorization
  # ============================================================

  - name: "mf"
    method: "bayesian"
    model_config: "configs/model/general/mf.yaml"
    params:
      - name: "train.lr"
        type: "float"
        range: "0.00001 0.01"
      - name: "train.embedding_l2"
        type: "float"
        range: "0.00001 0.01"
      - name: "model.embedding_dim"
        type: "int"
        range: "64 128"
    n_trials: 60
    patience: 20
    metric: "NDCG@20"

