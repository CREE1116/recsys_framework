  - name: "LiRA_Lambda_Search"
    method: "bayesian"
    model_config: "configs/model/csar/lira.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "100 500000" # Extremely wide as requested for LiRA
        log: true
    n_trials: 60
    patience: 30
    metric: "NDCG@10"

  - name: "LightLiRA_Lambda_K_Search"
    method: "bayesian"
    model_config: "configs/model/csar/light_lira.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "1 500000" # Extremely wide as requested for LiRA
        log: true
      - name: "model.k"
        type: "int_min_dim"
    n_trials: 80
    patience: 30
    metric: "NDCG@10"

  - name: "AdaptiveLIRA_Alpha_Lambda_Search"
    method: "bayesian"
    model_config: "configs/model/csar/ada_lira.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "1.0 100000"
        log: true
      - name: "model.alpha"
        type: "float"
        range: "0.0 1.0"
    n_trials: 60
    patience: 25
    metric: "NDCG@10"

  - name: "PairLIRA_Lambda_Search"
    method: "bayesian"
    model_config: "configs/model/csar/pair_lira.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "10.0 10000000.0"
        log: true
    n_trials: 50
    patience: 20
    metric: "NDCG@10"

  - name: "CSAR_CL_Gamma_Alpha_Search"
    method: "bayesian"
    model_config: "configs/model/csar/csar_cl.yaml"
    params:
      - name: "model.gamma"
        type: "float"
        range: "0.001 0.5"
        log: true
      - name: "model.ema_alpha"
        type: "float"
        range: "0.1 0.95"
    n_trials: 40
    patience: 15
    metric: "NDCG@10"
