datasets:
  - "configs/dataset/ml100k.yaml"
  # - "configs/dataset/ml1m.yaml"
  # - "configs/dataset/amazon_music.yaml"
  # - "configs/dataset/lastfm_2k.yaml"
  # - "configs/dataset/yelp2018.yaml"

searches:
  # --- Matrix Factorization & Linear Models ---

  - name: "PureSVD_Rank_Search"
    method: "bayesian"
    model_config: "configs/model/general/pure_svd.yaml"
    params:
      - name: "model.embedding_dim"
        type: "int_min_dim"
        log: true
    n_trials: 30
    patience: 10
    metric: "NDCG@10"

  - name: "EASE_Lambda_Search"
    method: "bayesian"
    model_config: "configs/model/general/ease.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "0.1 100000" # Widened to 100k
        log: true
    n_trials: 50
    patience: 20
    metric: "NDCG@10"

  - name: "SLIM_ElasticNet_Search"
    method: "bayesian"
    model_config: "configs/model/general/slim.yaml"
    params:
      - name: "model.alpha"
        type: "float"
        range: "1e-5 100.0" # Widened drastically
        log: true
      - name: "model.l1_ratio"
        type: "float"
        range: "0.0 1.0"
    n_trials: 60
    metric: "NDCG@10"

