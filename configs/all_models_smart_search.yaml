  - name: "RLAE_Params_Search"
    method: "bayesian"
    model_config: "configs/model/general/rlae.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "0.1 100000" # Widened to 100k
        log: true
      - name: "model.alpha"
        type: "float"
        range: "0.001 10.0" # Widened
        log: true
    n_trials: 60
    patience: 20
    metric: "NDCG@10"

  - name: "SANSA_Lambda_Search"
    method: "bayesian"
    model_config: "configs/model/general/sansa.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "0.1 100000" # Widened to 100k
        log: true
      - name: "model.density"
        type: "float"
        range: "0.0001 0.5" # 0.5 density is very high for approx, but let's allow it
        log: true
    n_trials: 60
    patience: 20
    metric: "NDCG@10"

  - name: "InfinityAE_Lambda_Search"
    method: "bayesian"
    model_config: "configs/model/general/infinity_ae.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "0.1 100000" # Widened to 100k
        log: true
    n_trials: 50
    patience: 20
    metric: "NDCG@10"

  - name: "SVDAE_Params_Search"
    method: "bayesian"
    model_config: "configs/model/general/svd_ae.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "0.1 100000" # Widened to 100k
        log: true
      - name: "model.k"
        type: "int_min_dim"
    n_trials: 60
    patience: 20
    metric: "NDCG@10"

  - name: "iALS_Lambda_Search"
    method: "bayesian"
    model_config: "configs/model/general/ials.yaml"
    params:
      - name: "model.reg_lambda"
        type: "float"
        range: "1e-5 100.0" # iALS usually likes smaller lambda, but 100 is safe upper bound
        log: true
      - name: "model.alpha"
        type: "float"
        range: "1.0 100.0"
        log: true
    n_trials: 50
    patience: 20
    metric: "NDCG@10"

