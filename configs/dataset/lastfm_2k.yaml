# LastFM-2k 데이터셋 설정
dataset_name: "lastfm_2k"
data_path: "./data/lastfm-2k/user_artists.dat"
separator: "\t"
columns: ["user_id", "item_id", "weight"] # weight = listening count
has_header: true # 첫 줄이 헤더

# 데이터 전처리 및 분할 설정
min_user_interactions: 5
min_item_interactions: 5
split_method: "random" # timestamp 없으므로 랜덤 스플릿
train_ratio: 0.8
valid_ratio: 0.1
data_cache_path: "./data_cache/"
