# 데이터셋 설정
dataset_name: "ml-1m-10c"
data_path: "/Users/leejongmin/code/recsys_framework/data/ml1m/ratings.dat"
separator: "::"
columns: ["user_id", "item_id", "rating", "timestamp"]

# 데이터 전처리 및 분할 설정
rating_threshold: 4 # 이 값 이상의 평점만 상호작용으로 간주 (임시 비활성화)
min_user_interactions: 10
min_item_interactions: 10
split_method: "temporal_ratio" # Leave-One-Out
data_cache_path: "./data_cache/" # 데이터셋 전처리 결과를 캐싱할 경로

