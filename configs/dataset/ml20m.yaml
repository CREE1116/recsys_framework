# 데이터셋 설정
dataset_name: "ml-20m"
data_path: "/Users/leejongmin/code/recsys_framework/data/ml20m/ratings_user10P.csv"
separator: ","
columns: ["user_id", "item_id", "rating", "timestamp"]

# 데이터 전처리 및 분할 설정
rating_threshold: 4
min_user_interactions: 5
min_item_interactions: 5
split_method: "temporal_ratio"
train_ratio: 0.8
valid_ratio: 0.1
data_cache_path: "./data_cache/"
