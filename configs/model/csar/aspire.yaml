model:
  name: "aspire"
  alpha: 500.0 # Same as regularize, but explicit name

  # Beta: Spectral Penalty Selection
  # 'auto_bias': Theoretically derived beta = gamma / (1+gamma)
  # 'auto_compromise': Theoretically derived beta = gamma / 2
  beta: "auto_compromise"
  # beta: "auto_bias"

  target_energy: 0.95
  visualize: true # Skip heavy visualizations for Bayesian searches
