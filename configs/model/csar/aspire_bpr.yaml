model:
  name: "aspire_bpr"
  embedding_dim: 128
  spectral_lambda: 0.1
  beta: "auto"
train:
  embedding_l2: 0.0001
  epochs: 500
  batch_size: 1024
  lr: 0.001
  optimizer: adam
  loss_type: pairwise
  num_negatives: 1
  negative_sampling_strategy: uniform
  negative_sampling_alpha: 0.75
  early_stop_patience: 40
device: auto
