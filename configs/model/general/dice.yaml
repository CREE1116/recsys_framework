model:
  name: "DICE"
  embedding_dim: 64
  dis_pen: 0.02
  int_weight: 0.1
  pop_weight: 0.1

train:
  embedding_l2: 0.0001
  weight_decay: 0.0
  epochs: 500
  batch_size: [1024]
  lr: 0.001
  optimizer: "adam"
  loss_type: "pairwise"
  num_negatives: 1
  negative_sampling_strategy: ["uniform"]
  negative_sampling_alpha: 0.75
  early_stop_patience: 40

evaluation:
  batch_size: 2048
  validation_method: "sampled"
  final_method: "full"
  metrics:
    [
      "NDCG",
      "PopRatio",
      "HitRate",
      "Coverage",
      "GiniIndex",
      "LongTailCoverage",
      "LongTailHitRate",
      "LongTailNDCG",
      "HeadHitRate",
      "HeadNDCG",
      "Entropy",
      "ILD",
      "GiniIndex_emb",
      "Novelty",
    ]
  top_k: [5, 10, 20, 50]
  main_metric: "NDCG"
  main_metric_k: 10
  long_tail_percent: 0.8

device: "auto"
