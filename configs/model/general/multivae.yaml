model:
  name: multivae
  latent_dim: 64
  hidden_dim: 200
  dropout_rate: 0.2
  anneal_cap: 0.2
  total_anneal_steps: 2000
train:
  embedding_l2: 0.0001
  weight_decay: 0.0
  batch_size: 1024
  epochs: 500
  learning_rate: 0.001
  optimizer: adam
  loss_type: pointwise
  early_stop_patience: 10
device: auto
