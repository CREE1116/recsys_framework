model:
  name: protomf-sampled
  embedding_dim: 64
  num_prototypes: 96
  sim_proto_weight: 0.1
  sim_batch_weight: 0.1
  cosine_type: shifted
  mode: UI
  temperature: 1.0
  use_zscore: false
train:
  embedding_l2: 0.0001
  weight_decay: 0.0
  batch_size: 1024
  epochs: 500
  learning_rate: 0.001
  optimizer: adam
  loss_type: pairwise
  num_negatives: 60
  negative_sampling_strategy:
  - uniform
  negative_sampling_alpha: 0.75
  early_stop_patience: 40
device: auto
