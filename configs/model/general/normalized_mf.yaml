model:
  name: "normalized-mf"
  embedding_dim: 64
  temperature: [0.3, 1.0] # Grid Search for best temperature
  use_zscore: [False] # Validation for Normalization Effect

# 학습 설정
train:
  embedding_l2: 0.0001
  weight_decay: 0.0
  epochs: 500
  batch_size:  1024
  lr: 0.001
  optimizer: "adam"
  loss_type: "pairwise" # 'pairwise', 'pointwise'
  num_negatives: 60 # For pairwise losses
  negative_sampling_strategy: "uniform" # 'uniform' or 'popularity'
  negative_sampling_alpha: 0.75
  early_stop_patience: 40

# 평가 설정
evaluation:
  batch_size:   2048 # MF allows large eval batch
  validation_method: "sampled"
  final_method: "full"
  metrics:
    [
      "NDCG",
      "PopRatio",
      "HitRate",
      "Coverage",
      "GiniIndex",
      "LongTailCoverage",
      "LongTailHitRate",
      "LongTailNDCG",
      "HeadHitRate",
      "HeadNDCG",
      "Entropy",
      "ILD",
      "GiniIndex_emb",
      "Novelty",
    ]
  top_k: [5, 10, 20, 50]
  main_metric: "NDCG"
  main_metric_k: 10
  long_tail_percent: 0.8

device: "auto"
