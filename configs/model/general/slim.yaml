model:
  name: slim
  alpha: 0.1 # regularization strength (ElasticNet alpha)
  l1_ratio: 0.5 # elastic net mixing: 1.0 = LASSO, 0.0 = Ridge
  positive_constraint: true
  max_iter: 1000 # coordinate descent max iterations per column
  tol: 1e-4 # coordinate descent convergence tolerance
  n_jobs: -1 # parallel columns: -1 = all CPU cores
device: auto
