# Slim (Sparse Linear Methods) Configuration
model:
  name: slim

  # Optimization Hyperparameters
  alpha: 0.1 # L1 + L2 Regularization strength (lambda)
  l1_ratio:
    0.5 # ElasticNet mixing parameter:
    # 1.0 = Lasso (L1 only), 0.0 = Ridge (L2 only)
    # penalty = alpha * l1_ratio * ||w||_1 + 0.5 * alpha * (1 - l1_ratio) * ||w||_2^2

  # Training Parameters (Proximal Gradient Descent)
  max_iter: 500
  tol: 1e-4 # Convergence tolerance
  learning_rate: 0.1
  positive_constraint: True # Enforce W >= 0 (Standard SLIM)

evaluation:
  batch_size: 2048
  validation_method: "sampled" # 검증 시 평가 방법
  final_method: "full" # 최종 평가 시 평가 방법
  metrics: [
      "NDCG",
      "PopRatio",
      "HitRate",
      "Coverage",
      "GiniIndex",
      "LongTailCoverage",
      "LongTailHitRate",
      "LongTailNDCG",
      "HeadHitRate",
      "HeadNDCG",
      "Entropy",
      "ILD",
      "GiniIndex_emb",
      "Novelty",
    ] # 평가할 메트릭 리스트
  top_k: [5, 10, 20, 50] # 평가할 K 값 리스트
  main_metric: "NDCG" # 얼리 스톱핑 및 베스트 모델 저장 기준 메트릭
  main_metric_k: 10 # 얼리 스톱핑 및 베스트 모델 저장 기준 메트릭의 K 값
  long_tail_percent: 0.8 # 롱테일 아이템 정의를 위한 비율 (인기도 하위 N%)

# 실행 환경 설정
device: "auto"
