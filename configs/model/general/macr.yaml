model:
  name: macr
  embedding_dim: 64
  c: 5.0
  alpha: 0.001
  beta: 0.001
train:
  embedding_l2: 0.0001
  weight_decay: 0.0
  batch_size: 1024
  epochs: 500
  lr: 0.001
  loss_type: bpr
  optimizer: adam
  num_negatives: 4
  negative_sampling_strategy: uniform
  negative_sampling_alpha: 0.75
  early_stop_patience: 40
device: auto
