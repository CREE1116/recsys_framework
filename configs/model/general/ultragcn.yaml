model:
  name: ultragcn
  embedding_dim: 64
  w1: 1e-4
  w2: 1e-4
  w3: 1e-4
  w4: 1e-4
  ii_neighbor_num: 10
train:
  embedding_l2: 0.0001
  weight_decay: 0.0
  epochs: 500
  batch_size: 1024
  lr: 0.001
  optimizer: adam
  loss_type: pairwise
  num_negatives: 1
  negative_sampling_strategy:
    - uniform
  negative_sampling_alpha: 0.75
  early_stop_patience: 30
device: auto
